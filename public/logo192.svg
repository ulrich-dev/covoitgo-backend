      <stop offset="100%" stop-color="#22C6AD"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0f7f4" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Carrosserie voiture -->
  <rect x="96" y="240" width="320" height="110" rx="18" fill="url(#car)"/>

  <!-- Toit arrondi -->
  <path d="M160 240 Q170 170 210 160 L302 160 Q342 170 352 240 Z" fill="url(#car)"/>

  <!-- Vitres -->
  <rect x="178" y="175" width="65" height="58" rx="8" fill="#1A9E8A" opacity="0.7"/>
  <rect x="252" y="175" width="85" height="58" rx="8" fill="#1A9E8A" opacity="0.7"/>

  <!-- Roues -->
  <circle cx="168" cy="352" r="44" fill="#1A4A44"/>
  <circle cx="168" cy="352" r="24" fill="#e0f7f4"/>
  <circle cx="168" cy="352" r="10" fill="#1A9E8A"/>
  <circle cx="344" cy="352" r="44" fill="#1A4A44"/>
  <circle cx="344" cy="352" r="24" fill="#e0f7f4"/>
  <circle cx="344" cy="352" r="10" fill="#1A9E8A"/>

  <!-- Phares -->
  <rect x="96" y="272" width="36" height="20" rx="6" fill="#FFE066"/>
  <rect x="380" y="272" width="36" height="20" rx="6" fill="#FF6B6B"/>

  <!-- Texte Clando -->
  <text x="256" y="472" font-family="Arial, sans-serif" font-size="64" font-weight="900"
